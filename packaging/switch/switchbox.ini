; SwitchBOX 运行配置 / SwitchBOX runtime configuration
; langs/ 会相对当前 ini 所在目录查找 / langs/ is searched relative to this ini file

; -----------软件参数--------------
[general]
; 设置页可直接修改的基础设置 / Basic settings exposed in the Settings page
language=auto

; 可播放扩展名，使用逗号分隔，前导点可省略 / Comma-separated extensions, leading dots are optional.
playable_extensions=8svx,aac,ac3,aif,asf,avi,dv,flv,m2ts,m2v,m4a,mkv,mov,mp3,mp4,mpeg,mpg,mts,ogg,rmvb,swf,ts,vob,wav,wma,wmv,flac,m3u,m3u8,webm,jpg,gif,png,iso

; 排序方式，可选值：name_asc,name_desc,date_asc,date_desc,size_asc,size_desc / Supported values: name_asc,name_desc,date_asc,date_desc,size_asc,size_desc
sort_order=name_asc

; ----下面是播放器设置---- / Player settings
; 是否启用硬件解码 / Whether hardware decoding is enabled
hardware_decode=true

; 短按快进/快退秒数 / Short seek step in seconds
short_seek=10

; 长按快进/快退秒数 / Long seek step in seconds
long_seek=60

; 长按 Y 时使用的倍速 / Playback speed used while holding Y in the future player shell
y_hold_speed_multiplier=2

; 连续跳转间隔（毫秒） / Continuous seek interval in milliseconds
continuous_seek_interval_ms=300

; 是否启用音轨语言优先选择 / Whether preferred audio language is enabled
use_preferred_audio_language=false

; 音轨语言代码；zh=中文优先（广泛匹配并优先普通话），en=英文优先，也可自定义输入如 eng、jpn、chi / Preferred audio language code; zh=prefer Chinese broadly with Mandarin priority, en=prefer English, or enter custom text such as eng, jpn, chi
preferred_audio_language=zh

; 是否启用字幕语言优先选择 / Whether preferred subtitle language is enabled
use_preferred_subtitle_language=false

; 字幕语言代码；zh=中文优先（广泛匹配并优先简体中文），en=英文优先，也可自定义输入如 eng、jpn、chi / Preferred subtitle language code; zh=prefer Chinese broadly with Simplified Chinese priority, en=prefer English, or enter custom text such as eng, jpn, chi
preferred_subtitle_language=zh

; -----以下为当前仅可在 ini 中修改的高级设置---- / Advanced settings that are currently intended for ini editing only
; 网络播放缓存秒数，默认值参考 nxmp / Network playback cache in seconds, default inspired by nxmp
demux_cache_sec=120

; 播放进度达到该百分比后开始记录断点 / Start writing resume records after this playback progress percent
resume_start_percent=5

; 剩余进度低于该百分比时不再记录断点 / Stop writing resume records when remaining progress is below this percent
resume_stop_percent=5

; 是否启用触摸操作 / Whether touch controls are enabled
touch_enable=true

; 是否允许触摸滑动快进 / Whether touch swipe seek is enabled
touch_swipe_seek=false

; 播放器默认音量（0-100），进入播放器时读取，退出时写回 / Player volume (0-100), loaded on player open and written back on exit
player_volume=50

; 右侧音量浮窗显示时长（毫秒），0=不显示 / Right-side volume OSD duration in milliseconds, 0 = disabled
player_volume_osd_duration_ms=500

; 左侧浮窗焦点停留后开始滚动的延迟（毫秒），0=立即滚动 / Delay before marquee starts on focused item in left overlay (milliseconds), 0 = immediate
overlay_marquee_delay_ms=500

; -----------IPTV--------------
; IPTV 源使用 [iptv-xxx] 形式的分组名 / IPTV sources use sections named [iptv-xxx]
; 示例 / Example:
; [iptv-main]
; title=主 IPTV / Main IPTV
; url=http://example.com/playlist.m3u
; enabled=true
; favorite_keys=iptv_xxxxxxxx,iptv_yyyyyyyy

; -----------SMB--------------
; SMB 源使用 [smb-xxx] 形式的分组名 / SMB sources use sections named [smb-xxx]
; 示例 / Example:
; [smb-media]
; title=家庭 NAS / Home NAS
; host=192.168.1.10
; share=video
; username=user
; password=pass
; enabled=true
