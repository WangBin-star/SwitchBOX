; SwitchBOX runtime configuration
; Copy this SwitchBOX folder into sdmc:/switch/
; langs/ is searched relative to this file directory

[general]
language=auto
playable_extensions=8svx,aac,ac3,aif,asf,avi,dv,flv,m2ts,m2v,m4a,mkv,mov,mp3,mp4,mpeg,mpg,mts,ogg,rmvb,swf,ts,vob,wav,wma,wmv,flac,m3u,m3u8,webm,iso

; IPTV sources use sections named [iptv-xxx]
; Example:
; [iptv-main]
; title=Main IPTV
; url=http://example.com/playlist.m3u8
; enabled=true

; SMB sources use sections named [smb-xxx]
; Example:
; [smb-media]
; title=Home NAS
; host=192.168.1.10
; share=video
; username=user
; password=pass
; enabled=true
